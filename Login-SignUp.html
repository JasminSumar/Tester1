		<style>
		
			*{
				color: #00FF0A;
				font-family: 'Iceberg';
				margin: 0px;
				padding: 0;
				box-sizing: border-box;
			}
			
			body{
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				background: #000;
				background-size: cover;
			}
			
			.container{
				position: relative;
				width: 400px;
				height: 256px;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			
			.container span{
				position: absolute;
				left: 72px;
				width: 32px;
				height: 6px;
				background: #000;
				border-radius: 8px;
				transform-origin: 128px;
				transform: scale(2.2) rotate(calc(var(--i)*(360deg /50)));
				animation: animateBlink 3s linear infinite;
				animation-delay: calc(var(--i)*(3s/50));
			}
			
			@keyframes animateBlink{
				0%{
					background: #00FF0A;
				}
				
				25%{
					background: #00FF0A;
				}
			}
			
			.login-box{
				position: relative;
				width: 400px;
				text-shadow: 100px 100px 100px #000;
			}
			
			.login-box form{
				width: 100%;
				padding: 0 50px;
			}
			
			h2{
				font-size: 2em;
				color: #00FF0A;
				text-align: center;
			}
			
			.input-box{
				position: relative;
				margin: 25px 0;
			}
			
			.input-box input{
				width: 100%;
				height: 50px;
				background: #000;
				border: 2px solid #00FF0A;
				outline: none;
				border-radius: 40px;
				font-size: 1em;
				color: ##00FF0A;
				padding: 0 20px;
				transition: .5s ease;
			}
			
			.input-box input:focus, .input-box input:valid{
				border-color: #00FF0A;
			}
			
			.input-box label{
				position: absolute;
				top: 50%;
				left: 20px;
				transform: translateY(-50%);
				font-size: 1em;
				color: #00FF0A;
				pointer-events: none;
				transition: .5s ease;
			}
			
			.input-box input:focus~label, .input-box input:valid~label{
				top: 1px;
				font-size: .8em;
				background: #000;
				border-radius: 10px;
				padding: 0 6px;
				color: #00FF0A;
			}
			
			.forgot-pass{
				margin: -15px 0 10px;
				text-align: center;
				text-shadow: 100px 100px 100px #000;
			}
			
			.forgot-pass a{
				font-size: .8em;
				color: ##00FF0A;
				text-decoration: none;
			}
			
			.forgot-pass a:hover{
				text-decoration: underline;
				color: #F00;
			}
			
			.btn{
				width: 100%;
				height: 45px;
				background: #00FF0A;
				border: none;
				outline: none;
				border-radius: 40px;
				cursor: pointer;
				font-size: 1em;
				color: #000;
				font-weight: 600;
			}
			
			.btn:hover{
				background-color: #000;
				color: #00FF0A;
				transition: 0.8s;
				border; 1px solid #00FF0A;
			}
			
			.signup-link{
				margin: 20px 0 10px;
				text-align: center;
				text-shadow: 100px 100px 100px #000;
			}
			
			.signup-link a{
				font-size: 1em;
				color: #00FF0A;
				text-decoration: none;
				font-weight: 600;
			}
			
			.signup-link a:hover{
				text-decoration: underline;
			}
			
			#bg-video {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				object-fit: cover;
				z-index: -1;
			}
			
			#home{
				text-align: center;
				color: #00FF0A;
				background: #000;
				border: 1px solid #00FF0A;
			}
		</style>
