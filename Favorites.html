			.hover-container {

			}

			.hover-trigger {

			}

			.dropdown-content {
				color: #000;
				visibility: hidden;
				opacity: 0;
				position: absolute;
				background: #000;
				padding: 10px;
				border: 1px solid #00FF0A;
				box-shadow: 0px 0px 0px #00FF0A;
				z-index: 1;
				width: 250px;
				transition: opacity 1s ease;
				max-height: 250px;
				overflow-y: auto;
				white-space: normal;
			}
			
			.hover-container:hover .dropdown-content {
					visibility: visible;
					opacity: 1;
			}
